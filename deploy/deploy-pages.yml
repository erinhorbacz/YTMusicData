# Builds the React app and publishes it to GitHub Pages on every push.
# The API base URL comes from the repository Actions variable API_URL
# (Settings → Secrets and variables → Actions → Variables).
name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: YTMusicApp/package-lock.json
      - run: npm ci --prefix YTMusicApp
      - run: npm run build --prefix YTMusicApp
        env:
          # Site lives at https://<user>.github.io/YTMusicData/
          PUBLIC_URL: /YTMusicData
          REACT_APP_API_URL: ${{ vars.API_URL }}
          # CRA fails the build on lint warnings when CI=true
          CI: "false"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: YTMusicApp/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
